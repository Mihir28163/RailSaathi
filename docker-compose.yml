version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: railsaathi_backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    volumes:
      - ./backend/models:/app/models
    networks:
      - railsaathi_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railsaathi_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - railsaathi_network
    restart: unless-stopped

networks:
  railsaathi_network:
    driver: bridge
